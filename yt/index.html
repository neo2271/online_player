<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no" />
        <meta name="theme-color" content="#000000" />
        <meta http-equiv="pragma" content="no-cache" />
        <title>Learning Playlist | MTG</title>
        <link
            rel="shortcut icon"
            type="image/x-icon"
            href="https://cdn1.minhtamgroup.org/icons/minhtam_500x500_black.png"
        />

        <style>
            @font-face {
                font-family: segoeui;
                src: url(https://cdn1.minhtamgroup.org/fonts/SEGOEUI.TTF);
            }
            * {
                font-family: segoeui;
                word-wrap: break-word;
            }

            body {
                margin: 0;
                display: flex;
                justify-content: center; /* căn giữa ngang */
                background: #000;
            }

            .container {
                width: 100%;

                display: flex;
                flex-direction: column; /* 👈 xếp dọc */
                align-items: center;
            }

            .container > * {
                width: 100%;
            }

            #player {
                margin-top: 10px;
                width: 79%;
                aspect-ratio: 16/9;
                border-radius: 10px;
                overflow: hidden;
            }

            .controls button {
                background: #111;
                color: white;
                border: none;
                padding: 12px 16px;
                margin: 0 6px;
                border-radius: 10px;
                cursor: pointer;
                font-size: 18px;
                transition: 0.2s;
            }

            .controls button:hover {
                background: #333;
                transform: scale(1.1);
            }

            .speed button,
            .category select {
                background: #111;
                color: white;
                border: none;
                padding: 8px 10px;
                margin: 0 3px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                transition: 0.2s;
            }

            .speed button:hover {
                background: #333;
                transform: scale(1.1);
            }

            .yt-link-wrapper {
                width: 100%;
                text-align: center;
                margin-top: 10px;
            }

            #ytLink {
                color: #4da6ff;
                font-size: 14px;
                display: inline-block;
            }

            #videoTitle {
                color: #fff;
                text-align: center;
                font-size: 14px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="player"></div>
            <div id="videoTitle"></div>
            <div class="speed" style="text-align: center; margin-top: 10px">
                <button onclick="setSpeed(0.5)">0.5x</button>
                <button onclick="setSpeed(1)">1x</button>
                <button onclick="setSpeed(1.25)">1.25x</button>
                <button onclick="setSpeed(1.5)">1.5x</button>
                <button onclick="setSpeed(1.75)">1.75x</button>
                <button onclick="setSpeed(2)">2x</button>
            </div>
            <div class="controls" style="text-align: center; margin-top: 10px">
                <button onclick="prevVideo()">
                    <i data-lucide="skip-back"></i>
                </button>

                <button onclick="togglePlay()" id="btnPlayPause">
                    <i data-lucide="play"></i>
                </button>

                <button onclick="nextVideo()">
                    <i data-lucide="skip-forward"></i>
                </button>
            </div>

            <div class="yt-link-wrapper">
                <a id="ytLink" href="#" target="_blank"></a>
            </div>

            <div class="category" style="text-align: center; margin-top: 10px">
                <select id="videoType" onchange="changeVideoType()">
                    <option value="all">Tất cả thể loại</option>
                    <option value="0">[0] Triết lý</option>
                    <option value="1">[1] Khoa học</option>
                </select>
            </div>
        </div>

        <script src="https://unpkg.com/lucide@latest"></script>

        <script>
            lucide.createIcons();
        </script>

        <script>
            let currentType = "all";
            let count = false;
            let videoIds = [];
            let currentIndex = 0;
            let player;
            let currentRate = 2;

            let video_count = 0;
            let video_total = 0;
            let video_idx = 1;

            const params = new URLSearchParams(window.location.search);
            if (
                params.has("count") &&
                (params.get("count") === "true" || params.get("count") === "1")
            ) {
                count = true;
            }
            console.log(`count: ${count}`);

            // 👉 Convert URL → videoId
            function getVideoId(url) {
                const regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;
                const match = url.match(regExp);
                return match ? match[1] : null;
            }

            // 👉 Gọi API
            async function loadVideos(type = "all") {
                try {
                    let apiUrl =
                        "https://dev-py-svl.minhtamgroup.org/api/v1/list/learning/yt";

                    if (type !== "all") {
                        apiUrl += `?type=${type}`;
                    }

                    const res = await fetch(apiUrl);
                    const json = await res.json();

                    if (json.code !== 0) {
                        console.error(`API lỗi: ${json.message}`);
                        return;
                    }

                    video_count = json.count;
                    video_total = json.total;

                    videoIds = json.data.map(getVideoId).filter(Boolean);
                    console.log("videoIds:", videoIds);

                    if (videoIds.length === 0) {
                        console.error("Không có video hợp lệ");
                        return;
                    }

                    currentIndex = 0;
                    video_idx = 1;

                    if (player) {
                        player.loadVideoById({
                            videoId: videoIds[0],
                            suggestedQuality: "large",
                        });

                        updateYoutubeLink();
                    } else {
                        initPlayer();
                    }
                } catch (err) {
                    console.error(`Fetch lỗi: ${err}`);
                }
            }

            // 👉 Load YouTube API
            const tag = document.createElement("script");
            tag.src = "https://www.youtube.com/iframe_api";
            document.body.appendChild(tag);

            function initPlayer() {
                player = new YT.Player("player", {
                    videoId: videoIds[currentIndex],
                    width: "100%",
                    height: "100%",
                    playerVars: {
                        autoplay: 0,
                        // mute: 1,
                    },
                    events: {
                        onReady: onPlayerReady,
                        onStateChange: onPlayerStateChange,
                    },
                });
                updateYoutubeLink();
            }

            function onPlayerReady(event) {
                event.target.playVideo();
                updateYoutubeLink();
                updateVideoTitle();
            }

            function onPlayerStateChange(event) {
                const btn = document.getElementById("btnPlayPause");

                if (event.data === YT.PlayerState.PLAYING) {
                    setSpeed(currentRate);
                    updateVideoTitle();
                    btn.innerHTML = '<i data-lucide="pause"></i>';
                }

                if (event.data === YT.PlayerState.PAUSED) {
                    btn.innerHTML = '<i data-lucide="play"></i>';
                }

                if (event.data === YT.PlayerState.ENDED) {
                    nextVideo();
                }
                lucide.createIcons();
            }

            function togglePlay() {
                if (!player) return;

                const state = player.getPlayerState();
                const btn = document.getElementById("btnPlayPause");

                if (state === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                    btn.innerHTML = '<i data-lucide="play"></i>';
                } else if (state === -1 || state === YT.PlayerState.BUFFERING) {
                    // Lần đầu load: dùng loadVideoById để trigger play có user gesture
                    player.loadVideoById({
                        videoId: videoIds[currentIndex],
                        suggestedQuality: "large",
                    });
                } else {
                    player.playVideo();
                    btn.innerHTML = '<i data-lucide="pause"></i>';
                }
                lucide.createIcons(); // re-render icon sau khi đổi
            }

            function nextVideo() {
                let previousVideoId = videoIds[currentIndex];

                if (count) {
                    // Mark video as watched
                    console.info(`Marking as watched: ${previousVideoId}`);
                    fetch(
                        `https://dev-py-svl.minhtamgroup.org/api/v1/list/learning/yt/mark-watched/${previousVideoId}`,
                        { method: "POST" },
                    );
                }

                currentIndex++;
                if (currentIndex >= videoIds.length) {
                    console.log("Hết playlist, tải lại web");
                    location.reload();
                    return;
                }

                player.loadVideoById({
                    videoId: videoIds[currentIndex],
                    suggestedQuality: "large",
                });
                updateYoutubeLink();
                video_idx += 1;
            }

            function prevVideo() {
                currentIndex--;

                if (currentIndex < 0) {
                    return;
                }

                player.loadVideoById(videoIds[currentIndex]);
                updateYoutubeLink();
                video_idx -= 1;
            }

            function updateYoutubeLink() {
                const videoId = videoIds[currentIndex];
                const url = `https://play.minhtamgroup.org/?url=https://www.youtube.com/watch?v=${videoId}`;
                const link = document.getElementById("ytLink");

                link.href = url;
                link.textContent = url;
            }

            function updateVideoTitle() {
                const data = player.getVideoData();
                console.info("Video data:", data);
                const duration = player.getDuration();
                const minutes = Math.floor(duration / 60);
                const seconds = Math.floor(duration % 60)
                    .toString()
                    .padStart(2, "0");

                let title = [
                    `[${video_idx}/${video_count}/${video_total}] ${minutes}:${seconds}`,
                    data?.author || "",
                    data?.title || "",
                ]
                    .filter(Boolean)
                    .join(" | ");
                console.info(`title: ${title}`);
                document.getElementById("videoTitle").textContent = title;
            }

            function forcePlaybackRate(rate) {
                if (!player) return;

                // nếu đang đúng rate rồi thì ép đổi tạm
                const tempRate = rate === 2 ? 1.5 : 1;
                player.setPlaybackRate(tempRate);
                setTimeout(() => {
                    player.setPlaybackRate(rate);
                }, 150);
            }

            function setSpeed(rate) {
                currentRate = rate;
                forcePlaybackRate(rate);
            }

            function changeVideoType() {
                const select = document.getElementById("videoType");
                currentType = select.value;
                loadVideos(currentType);
            }

            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight") nextVideo();
                if (e.key === "ArrowLeft") prevVideo();
            });

            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "visible") {
                    setTimeout(() => {
                        setSpeed(currentRate);
                    }, 300);
                }
            });

            window.addEventListener("focus", () => {
                setSpeed(currentRate);
            });

            // 👉 start
            loadVideos();
        </script>
    </body>
</html>
